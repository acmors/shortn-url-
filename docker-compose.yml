
services:
  postgres:
    image: postgres:15-alpine
    container_name: shortn-db
    environment:
      POSTGRES_DB: shortn
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:latest
    container_name: shortn-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
  app:
    build: .
    container_name: shortn-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/shortn
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APP_BASE_URL: http://localhost:8080
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started

volumes:
  postgres_data:
  redis_data: