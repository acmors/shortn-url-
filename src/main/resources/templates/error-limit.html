<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rate Limit - shortn</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        .card {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 2.5rem;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }
        .icon {
            font-size: 4rem;
            color: #f59e0b;
            margin-bottom: 1rem;
        }
        h1 {
            font-size: 1.5rem;
            color: #1a1a2e;
            margin-bottom: 1rem;
        }
        .message {
            color: #666;
            margin-bottom: 1rem;
            line-height: 1.5;
        }
        .retry-after {
            background: #fef3c7;
            padding: 0.75rem;
            border-radius: 8px;
            color: #92400e;
            font-size: 0.85rem;
            margin-bottom: 2rem;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn:hover { opacity: 0.9; transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">
            <i class="fas fa-tachometer-alt"></i>
        </div>
        <h1>Too Many Requests</h1>
        <div class="message" th:text="${error} ?: 'You have exceeded the rate limit of 3 URLs per minute.'">
            You have exceeded the rate limit of 3 URLs per minute.
        </div>
        <div class="retry-after">
            <i class="fas fa-clock"></i> Please wait 60 seconds before trying again.
        </div>
        <a href="/" class="btn">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>
    </div>
</body>
</html>
