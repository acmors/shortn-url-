server:
  port: 8080

spring:
  cache:
    type: redis
  data:
    redis:
      host: localhost
      port: 6379
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/shortn
    username: postgres
    password: postgres
    initialization-mode: always
    continue-on-error: true
    platform: postgresql
  jpa:
    hibernate:
      ddl-auto: create-drop
      format_sql: true
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  base-url: http://localhost:8080
  rate-limit:
    max-requests: 10
    window-seconds: 60
  cache:
    link-ttl-minutes: 30