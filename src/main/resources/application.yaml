server:
  port: 8080

spring:
  mvc:
    favicon:
      enabled: false
  cache:
    type: redis
  data:
    redis:
      host: localhost
      port: 6379
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/shortn
    username: postgres
    password: postgres
    initialization-mode: always
    continue-on-error: true
    platform: postgresql
  jpa:
    hibernate:
      ddl-auto: create-drop
      format_sql: true
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  base-url: http://localhost:8080

logging:
  level:
    org.springframework.web.servlet.PageNotFound: OFF

resilience4j:
  ratelimiter:
    instances:
      createShortUrl:
        limit-for-period: 3
        limit-refresh-period: 60s
        timeout-duration: 0